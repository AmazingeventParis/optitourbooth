workflows:
  ios-build:
    name: iOS Build & TestFlight
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      groups:
        - apple_credentials
      node: 20
      xcode: latest
      cocoapods: default
      vars:
        VITE_API_URL: "https://optitourbooth-api.swipego.app/api"
        VITE_CAPACITOR: "true"
    scripts:
      - name: Install dependencies
        script: |
          export NODE_ENV=development
          cd frontend
          npm install --include=dev --legacy-peer-deps
      - name: Build web assets
        script: |
          cd frontend
          export VITE_API_URL="https://optitourbooth-api.swipego.app/api"
          export VITE_CAPACITOR="true"
          npx vite build
      - name: Sync Capacitor iOS
        script: |
          cd frontend
          npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd frontend/ios/App
          pod install
      - name: Set up code signing
        script: |
          mkdir -p "$HOME/private_keys"
          echo -n "$APP_STORE_CONNECT_PRIVATE_KEY" > "$HOME/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8"
          keychain initialize
          app-store-connect fetch-signing-files \
            "app.swipego.optitourbooth" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Increment build number
        script: |
          cd frontend/ios/App
          LATEST_BUILD=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_CONNECT_APP_ID" 2>/dev/null || echo "0")
          NEW_BUILD=$((LATEST_BUILD + 1))
          agvtool new-version -all $NEW_BUILD
      - name: Build iOS app
        script: |
          cd frontend/ios/App
          # Create export options plist
          cat > exportOptions.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST

          # Archive
          xcodebuild archive \
            -workspace "App.xcworkspace" \
            -scheme "App" \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/App.xcarchive" \
            DEVELOPMENT_TEAM="${APPLE_TEAM_ID}" \
            -allowProvisioningUpdates

          # Export IPA
          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/App.xcarchive" \
            -exportOptionsPlist exportOptions.plist \
            -exportPath build/ios/ipa
    artifacts:
      - frontend/ios/App/build/ios/ipa/*.ipa
      - "*.xcarchive"
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        beta_groups:
          - External Testers
