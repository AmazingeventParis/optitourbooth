workflows:
  ios-build:
    name: iOS Build & TestFlight
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      groups:
        - apple_credentials
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.swipego.optitourbooth
      node: 20
      xcode: latest
      cocoapods: default
      vars:
        VITE_API_URL: "https://optitourbooth-api.swipego.app/api"
        VITE_CAPACITOR: "true"
    scripts:
      - name: Install pnpm
        script: |
          npm install -g pnpm
      - name: Install frontend dependencies
        script: |
          cd frontend
          pnpm install --frozen-lockfile
      - name: Build web assets for Capacitor
        script: |
          cd frontend
          pnpm vite build --mode capacitor
      - name: Sync Capacitor iOS
        script: |
          cd frontend
          npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd frontend/ios/App
          pod install
      - name: Set up App Store Connect key for signing
        script: |
          # Write the .p8 key file from env var
          mkdir -p ~/private_keys
          echo -n "$APP_STORE_CONNECT_PRIVATE_KEY" > ~/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8

          # Initialize keychain for code signing
          keychain initialize

          # Fetch signing certificates and profiles from App Store Connect
          app-store-connect fetch-signing-files \
            "app.swipego.optitourbooth" \
            --type IOS_APP_STORE \
            --create

          # Install fetched certificates to keychain
          keychain add-certificates

          # Set up provisioning profiles for Xcode
          xcode-project use-profiles
      - name: Increment build number
        script: |
          cd frontend/ios/App
          LATEST_BUILD=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_CONNECT_APP_ID" 2>/dev/null || echo "0")
          NEW_BUILD=$((LATEST_BUILD + 1))
          echo "Build number: $NEW_BUILD"
          agvtool new-version -all $NEW_BUILD
      - name: Build iOS app
        script: |
          cd frontend/ios/App
          xcode-project build-ipa \
            --workspace "App.xcworkspace" \
            --scheme "App" \
            --config "Release"
    artifacts:
      - frontend/ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        # Uses APP_STORE_CONNECT_* env vars from apple_credentials group
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        beta_groups:
          - External Testers
