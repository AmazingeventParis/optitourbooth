workflows:
  android-apk:
    name: Android APK Build
    max_build_duration: 45
    instance_type: linux_x2
    environment:
      node: 20
      java: 17
      vars:
        VITE_API_URL: "https://optitourbooth-api.swipego.app/api"
        VITE_CAPACITOR: "true"
    scripts:
      - name: Install dependencies
        script: |
          cd frontend
          npm install --include=dev --legacy-peer-deps
      - name: Build web assets (capacitor mode)
        script: |
          cd frontend
          npx vite build --mode capacitor
      - name: Init & sync Capacitor Android
        script: |
          cd frontend
          npx cap add android 2>/dev/null || echo "Platform already exists"
          npx cap sync android
      - name: Build debug APK
        script: |
          cd frontend/android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
      - name: Copy APK to public/downloads
        script: |
          cp frontend/android/app/build/outputs/apk/debug/app-debug.apk \
             frontend/public/downloads/optitour.apk
          echo "APK size: $(du -sh frontend/public/downloads/optitour.apk | cut -f1)"
      - name: Commit and push updated APK
        script: |
          git config user.email "ci@swipego.app"
          git config user.name "Codemagic CI"
          git add frontend/public/downloads/optitour.apk
          git commit -m "build: update Android APK [ci skip]" || echo "Nothing to commit"
          git push origin master || echo "Push failed — download artifact manually"
    artifacts:
      - frontend/android/app/build/outputs/apk/debug/app-debug.apk
      - frontend/public/downloads/optitour.apk

  ios-build:
    name: iOS Build & TestFlight
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      groups:
        - apple_credentials
      node: 20
      xcode: latest
      cocoapods: default
      vars:
        NODE_ENV: "development"
        VITE_API_URL: "https://optitourbooth-api.swipego.app/api"
        VITE_CAPACITOR: "true"
    scripts:
      - name: Install dependencies
        script: |
          cd frontend
          npm install --include=dev --legacy-peer-deps
      - name: Build web assets
        script: |
          cd frontend
          npx vite build
      - name: Sync Capacitor iOS
        script: |
          cd frontend
          npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd frontend/ios/App
          pod install
      - name: Set up code signing
        script: |
          # Write the App Store Connect API key
          mkdir -p "$HOME/private_keys"
          echo -n "$APP_STORE_CONNECT_PRIVATE_KEY" > "$HOME/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8"

          # Generate certificate private key if not provided
          if [ -z "$CERTIFICATE_PRIVATE_KEY" ]; then
            echo "Generating RSA key for certificate..."
            export CERTIFICATE_PRIVATE_KEY=$(openssl genrsa 2048 2>/dev/null)
          fi

          keychain initialize

          # Fetch or create signing files
          app-store-connect fetch-signing-files \
            "app.swipego.optitourbooth" \
            --type IOS_APP_STORE \
            --create

          keychain add-certificates
          xcode-project use-profiles
      - name: Increment build number
        script: |
          cd frontend/ios/App
          LATEST_BUILD=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_CONNECT_APP_ID" 2>/dev/null || echo "0")
          NEW_BUILD=$((LATEST_BUILD + 1))
          agvtool new-version -all $NEW_BUILD
      - name: Build iOS app
        script: |
          cd frontend/ios/App
          xcode-project build-ipa \
            --workspace "App.xcworkspace" \
            --scheme "App" \
            --archive-flags="DEVELOPMENT_TEAM=${APPLE_TEAM_ID}"
    artifacts:
      - frontend/ios/App/build/ios/ipa/*.ipa
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        beta_groups:
          - External Testers
