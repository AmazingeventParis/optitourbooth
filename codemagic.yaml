workflows:
  ios-build:
    name: iOS Build & TestFlight
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      groups:
        - apple_credentials
      node: 20
      xcode: latest
      cocoapods: default
      vars:
        NODE_ENV: "development"
        VITE_API_URL: "https://optitourbooth-api.swipego.app/api"
        VITE_CAPACITOR: "true"
    scripts:
      - name: Install dependencies
        script: |
          cd frontend
          npm config set production false
          npm config delete omit
          npm install --include=dev --legacy-peer-deps
          echo "Installed packages count:"
          ls node_modules | wc -l
          echo "TypeScript:"
          ls -la node_modules/.bin/tsc 2>/dev/null || echo "NOT FOUND"
          echo "Vite:"
          ls -la node_modules/.bin/vite 2>/dev/null || echo "NOT FOUND"
          echo "npm config list:"
          npm config list
      - name: Build web assets
        script: |
          cd frontend
          npx vite build
      - name: Sync Capacitor iOS
        script: |
          cd frontend
          npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd frontend/ios/App
          pod install
      - name: Set up code signing
        script: |
          mkdir -p "$HOME/private_keys"
          echo -n "$APP_STORE_CONNECT_PRIVATE_KEY" > "$HOME/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8"
          keychain initialize
          app-store-connect fetch-signing-files \
            "app.swipego.optitourbooth" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Increment build number
        script: |
          cd frontend/ios/App
          LATEST_BUILD=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_CONNECT_APP_ID" 2>/dev/null || echo "0")
          NEW_BUILD=$((LATEST_BUILD + 1))
          agvtool new-version -all $NEW_BUILD
      - name: Build iOS app
        script: |
          cd frontend/ios/App
          xcode-project build-ipa \
            --workspace "App.xcworkspace" \
            --scheme "App" \
            --archive-flags="DEVELOPMENT_TEAM=${APPLE_TEAM_ID}"
    artifacts:
      - frontend/ios/App/build/ios/ipa/*.ipa
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        beta_groups:
          - External Testers
