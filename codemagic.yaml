workflows:
  ios-build:
    name: iOS Build & TestFlight
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      groups:
        - apple_credentials
      node: 20
      xcode: latest
      cocoapods: default
      vars:
        VITE_API_URL: "https://optitourbooth-api.swipego.app/api"
        VITE_CAPACITOR: "true"
    scripts:
      - name: Install dependencies
        script: |
          set -ex
          export NODE_ENV=development
          cd frontend
          node -v
          npm -v
          # Force install ALL deps (including devDependencies needed for build)
          npm install --include=dev --legacy-peer-deps
          # Verify vite is installed
          ls node_modules/.bin/vite || echo "VITE NOT FOUND!"
          npx vite --version
      - name: Build web assets
        script: |
          cd frontend
          export VITE_API_URL="https://optitourbooth-api.swipego.app/api"
          export VITE_CAPACITOR="true"
          npx vite build 2>&1 | tee /tmp/vite-build.log || {
            echo "=== VITE BUILD FAILED ==="
            cat /tmp/vite-build.log
            exit 1
          }
      - name: Sync Capacitor iOS
        script: |
          cd frontend
          npx cap sync ios 2>&1 | tee /tmp/cap-sync.log || {
            echo "=== CAP SYNC FAILED ==="
            cat /tmp/cap-sync.log
            exit 1
          }
      - name: Install CocoaPods
        script: |
          cd frontend/ios/App
          pod install 2>&1 | tee /tmp/pod-install.log || {
            echo "=== POD INSTALL FAILED ==="
            cat /tmp/pod-install.log
            exit 1
          }
      - name: Set up code signing
        script: |
          mkdir -p "$HOME/private_keys"
          echo -n "$APP_STORE_CONNECT_PRIVATE_KEY" > "$HOME/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8"
          keychain initialize
          app-store-connect fetch-signing-files \
            "app.swipego.optitourbooth" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Increment build number
        script: |
          cd frontend/ios/App
          LATEST_BUILD=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_CONNECT_APP_ID" 2>/dev/null || echo "0")
          NEW_BUILD=$((LATEST_BUILD + 1))
          echo "Build number: $NEW_BUILD"
          agvtool new-version -all $NEW_BUILD
      - name: Build iOS app
        script: |
          cd frontend/ios/App
          xcode-project build-ipa \
            --workspace "App.xcworkspace" \
            --scheme "App" \
            --config "Release"
    artifacts:
      - frontend/ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - /tmp/vite-build.log
      - /tmp/pod-install.log
      - /tmp/cap-sync.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        beta_groups:
          - External Testers
